{% extends 'base.html' %}

{% block content %}

<h2>Отправить письмо</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        {{ form.receiver_email.label_tag }}
        {{ form.receiver_email }}
    </div>

    <div class="mb-3">
        {{ form.subject.label_tag }}
        {{ form.subject }}
    </div>

    <div class="mb-3">
        {{ form.body.label_tag }}
        {{ form.body }}
    </div>

    <button type="submit" class="btn btn-primary">Отправить</button>
    <a href="{% url 'email_list' %}" class="btn btn-secondary">Отмена</a>

</form>

{% endblock %}
