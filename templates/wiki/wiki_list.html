{% extends 'base.html' %}

{% block content %}

<h2>Вики</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Название</th>
            <th>Автор</th>
            <th>Создано</th>
            <th>Действия</th>
        </tr>
    </thead>

    <tbody>
        {% for page in pages %}
        <tr>
            <td>{{ page.title }}</td>
            <td>{{ page.author }}</td>
            <td>{{ page.created_at }}</td>
            <td>
                <a href="{% url 'wiki_update' page.id %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'wiki_delete' page.id %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Нет страниц</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{% url 'wiki_create' %}" class="btn btn-primary mb-3">
    Создать страницу
</a>

{% endblock %}
