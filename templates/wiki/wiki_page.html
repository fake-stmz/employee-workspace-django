{% extends 'base.html' %}

{% block content %}

<h1 class="mb-3">{{ page.title }}</h1>

<hr>

<div class="mb-4">
    {{ page.content|linebreaks }}
</div>

<p class="text-muted">
    Автор: {{ page.author }} | Создано: {{ page.created_at }}
</p>

<a href="{% url 'wiki_list' %}" class="btn btn-danger mt-3">
    Назад
</a>

{% endblock %}
