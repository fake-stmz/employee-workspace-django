{% extends 'base.html' %}

{% block content %}

<h2>{{ title }}</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        {{ form.title.label_tag }}
        {{ form.title }}
    </div>

    <div class="mb-3">
        {{ form.content.label_tag }}
        {{ form.content }}
    </div>

    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'wiki_list' %}" class="btn btn-secondary">Отмена</a>

</form>

{% endblock %}
