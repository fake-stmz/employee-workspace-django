<!DOCTYPE html>
<html>
<head>
    <title>Employee Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-nav">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Workspace</a>
            <a class="nav-link text-white" href="{% url 'task_list' %}">Задания</a>
            <a class="nav-link text-white" href="{% url 'employee_list' %}">Сотрудники</a>
            <a class="nav-link text-white" href="{% url 'client_list' %}">Клиенты</a>
            <a class="nav-link text-white" href="{% url 'wiki_list' %}">Вики</a>
            <a class="nav-link text-white" href="{% url 'email_list' %}">Почта</a>
        </div>
        

        <div class="d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="text-white me-3">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-outline-light" type="submit">Выйти</button>
                </form>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
