{% extends 'base.html' %}

{% block content %}

<h2>Сотрудники</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Имя</th>
            <th>Email</th>
            <th>Должность</th>
            <th>Отдел</th>
        </tr>
    </thead>

    <tbody>
        {% for emp in employees %}
        <tr>
            <td>{{ emp.full_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.position }}</td>
            <td>{{ emp.department }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Нет сотрудников</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
