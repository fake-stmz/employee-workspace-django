{% extends 'base.html' %}

{% block content %}

<h3>Удаление задачи</h3>

<p>Вы действительно хотите удалить "{{ task.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary">Отмена</a>
</form>

{% endblock %}
