{% extends 'base.html' %}

{% block content %}

<h2>Клиенты</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Название/Имя</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Менеджер</th>
        </tr>
    </thead>

    <tbody>
        {% for client in clients %}
        <tr>
            <td>{{ client.name }}</td>
            <td>{{ client.phone }}</td>
            <td>{{ client.email }}</td>
            <td>{{ client.manager }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Нет клиентов</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
